<h2 style="margin:0 0 8px;font-size:20px;font-weight:800;color:#111">New support request</h2>
<p style="margin:0 0 18px;font-size:13px;color:#52525b">Someone submitted a message via the support chat on your landing page.</p>
<table style="width:100%;border-collapse:collapse;margin-bottom:18px">
  <tr><td style="padding:8px 12px;background:#f4f4f5;border-radius:6px 6px 0 0;font-size:11px;font-weight:700;color:#71717a;text-transform:uppercase;letter-spacing:.06em">From</td></tr>
  <tr><td style="padding:10px 12px;border:1px solid #e4e4e7;border-top:none;font-size:14px;color:#111;font-weight:600">{{FROM_NAME}} &lt;{{FROM_EMAIL}}&gt;</td></tr>
</table>
<table style="width:100%;border-collapse:collapse;margin-bottom:20px">
  <tr><td style="padding:8px 12px;background:#f4f4f5;border-radius:6px 6px 0 0;font-size:11px;font-weight:700;color:#71717a;text-transform:uppercase;letter-spacing:.06em">Message</td></tr>
  <tr><td style="padding:14px 12px;border:1px solid #e4e4e7;border-top:none;font-size:14px;color:#374151;line-height:1.7">{{MESSAGE}}</td></tr>
</table>
<a href="mailto:{{FROM_EMAIL}}" style="display:inline-block;background:linear-gradient(135deg,#5b8def,#a855f7);color:#fff;padding:11px 24px;border-radius:8px;text-decoration:none;font-weight:700;font-size:14px">Reply to {{FROM_NAME}}</a>
