<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>{{SUBJECT}}</title>
</head>
<body style="margin:0;padding:0;background:#f4f4f5;font-family:Inter,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f5;padding:32px 16px">
  <tr><td align="center">
    <table width="560" cellpadding="0" cellspacing="0" style="max-width:560px;width:100%">
      <!-- Logo -->
      <tr><td style="padding-bottom:20px;text-align:center">
        <a href="{{APP_URL}}" style="text-decoration:none;display:inline-flex;align-items:center;gap:8px">
          <span style="display:inline-block;width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#5b8def,#a855f7);line-height:32px;text-align:center;font-size:15px;color:#fff;font-weight:900">W</span>
          <span style="font-size:14px;font-weight:800;color:#111;letter-spacing:-.3px">Web Cloner</span>
        </a>
      </td></tr>
      <!-- Card -->
      <tr><td style="background:#fff;border-radius:14px;border:1px solid #e4e4e7;padding:36px 40px">
        {{CONTENT}}
        <!-- Footer inside card -->
        <table width="100%" cellpadding="0" cellspacing="0" style="margin-top:32px;padding-top:20px;border-top:1px solid #f4f4f5">
          <tr><td style="font-size:12px;color:#a1a1aa;line-height:1.6">
            You received this email because your account at <a href="{{APP_URL}}" style="color:#5b8def;text-decoration:none">{{APP_HOST}}</a> triggered this notification.<br>
            If you didn't take this action, you can safely ignore this email or <a href="mailto:{{SUPPORT_EMAIL}}" style="color:#5b8def;text-decoration:none">contact support</a>.
          </td></tr>
        </table>
      </td></tr>
      <!-- Bottom spacer -->
      <tr><td style="padding:16px 0;text-align:center;font-size:11px;color:#a1a1aa">
        &copy; {{YEAR}} Web Cloner &nbsp;&middot;&nbsp;
        <a href="{{APP_URL}}/privacy" style="color:#a1a1aa;text-decoration:none">Privacy</a> &nbsp;&middot;&nbsp;
        <a href="{{APP_URL}}/tos" style="color:#a1a1aa;text-decoration:none">Terms</a>
      </td></tr>
    </table>
  </td></tr>
</table>
</body>
</html>
