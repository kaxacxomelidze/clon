<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clonyfy</title>
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #000;
            --bg2: #080808;
            --border: #181818;
            --border2: #222;
            --text: #f2f2f2;
            --text2: #7a7a7a;
            --text3: #3a3a3a;
            --blue: #5b8def;
            --red: #ff4560;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* LOGIN SCREEN */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-screen.hidden {
            display: none;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-logo {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
        }

        .login-title {
            font-size: 24px;
            color: #1a202c;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 14px;
            color: #718096;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #2d3748;
            margin-bottom: 8px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-bottom: 16px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            background-color: #fed7d7;
            color: #c53030;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #c53030;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .footer-text {
            text-align: center;
            font-size: 14px;
            color: #718096;
        }

        .footer-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-text a:hover {
            color: #764ba2;
        }

        /* DASHBOARD */
        .dashboard-screen {
            min-height: 100vh;
            background: var(--bg);
        }

        .dashboard-screen.hidden {
            display: none;
        }

        .topbar {
            height: 52px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 14px;
        }

        .topbar-logo {
            font-size: 16px;
            font-weight: 800;
            background: linear-gradient(135deg, #5b8def 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .topbar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logout-btn {
            color: var(--red);
            font-size: 12px;
            font-weight: 600;
            padding: 5px 10px;
            border: 1px solid rgba(255, 69, 96, 0.2);
            border-radius: 6px;
            background: rgba(255, 69, 96, 0.05);
            cursor: pointer;
            transition: all 0.15s;
        }

        .logout-btn:hover {
            background: rgba(255, 69, 96, 0.1);
            border-color: rgba(255, 69, 96, 0.4);
        }

        .dashboard-content {
            max-width: 980px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .dashboard-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .dashboard-subtitle {
            color: var(--text2);
            margin-bottom: 30px;
        }

        .welcome-message {
            background: rgba(91, 141, 239, 0.08);
            border: 1px solid rgba(91, 141, 239, 0.2);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .welcome-message h2 {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .welcome-message p {
            color: var(--text2);
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="login-screen">
        <div class="login-container">
            <div class="login-header">
                <div class="login-logo">Clonyfy</div>
                <h1 class="login-title">Welcome back</h1>
                <p class="login-subtitle">Sign in to your account to continue</p>
            </div>

            <div id="errorMessage" class="error-message"></div>

            <form id="signInForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="you@example.com"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">
                    Sign In
                </button>
            </form>

            <div class="footer-text">
                Don't have an account? <a href="/sign-up">Sign up</a>
            </div>
        </div>
    </div>

    <!-- DASHBOARD SCREEN -->
    <div id="dashboardScreen" class="dashboard-screen hidden">
        <div class="topbar">
            <div class="topbar-logo">Clonyfy</div>
            <div class="topbar-right">
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
        </div>

        <div class="dashboard-content">
            <h1 class="dashboard-title">Dashboard</h1>
            <p class="dashboard-subtitle">Welcome to your Clonyfy workspace</p>

            <div class="welcome-message">
                <h2>Get Started</h2>
                <p>Clone any website by pasting its URL. Our AI will create a pixel-perfect, fully editable Next.js project in seconds.</p>
            </div>
        </div>
    </div>

    <script>
        const loginScreen = document.getElementById('loginScreen');
        const dashboardScreen = document.getElementById('dashboardScreen');
        const signInForm = document.getElementById('signInForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('errorMessage');
        const submitBtn = document.getElementById('submitBtn');
        const logoutBtn = document.getElementById('logoutBtn');

        // Check authentication on load
        function checkAuth() {
            const token = localStorage.getItem('authToken') || localStorage.getItem('token');
            if (token) {
                loginScreen.classList.add('hidden');
                dashboardScreen.classList.remove('hidden');
            } else {
                loginScreen.classList.remove('hidden');
                dashboardScreen.classList.add('hidden');
            }
        }

        // Check auth on page load
        window.addEventListener('DOMContentLoaded', checkAuth);
        checkAuth();

        // Handle login
        signInForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.classList.remove('show');
            submitBtn.disabled = true;
            const originalText = submitBtn.textContent;
            submitBtn.innerHTML = 'Signing in...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: emailInput.value.trim(),
                        password: passwordInput.value
                    })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('token', data.token);
                    checkAuth();
                } else {
                    errorMessage.textContent = data.error || 'Sign in failed. Please try again.';
                    errorMessage.classList.add('show');
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                }
            } catch (error) {
                console.error('Sign in error:', error);
                errorMessage.textContent = 'An error occurred. Please try again.';
                errorMessage.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });

        // Handle logout
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('authToken');
            localStorage.removeItem('token');
            checkAuth();
            emailInput.value = '';
            passwordInput.value = '';
        });

        // Clear error on input
        emailInput.addEventListener('input', () => {
            if (errorMessage.classList.contains('show')) {
                errorMessage.classList.remove('show');
            }
        });

        passwordInput.addEventListener('input', () => {
            if (errorMessage.classList.contains('show')) {
                errorMessage.classList.remove('show');
            }
        });
    </script>
</body>
</html>
