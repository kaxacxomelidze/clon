<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password · CLONYFY</title>
<link rel="icon" href="/icon.png" type="image/png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#07071a;font-family:'Inter',system-ui,sans-serif;font-size:13px;display:flex;align-items:center;justify-content:center;color:#e8e8ff;padding:24px;position:relative}
body::before{content:'';position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(91,141,239,.1) 0%,rgba(168,85,247,.06) 35%,transparent 65%);top:50%;left:50%;transform:translate(-50%,-55%);pointer-events:none;filter:blur(70px)}
.card{width:min(420px,100%);background:rgba(12,12,28,.95);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:40px 36px;position:relative;z-index:1;box-shadow:0 24px 80px rgba(0,0,10,.7)}
.card::before{content:'';position:absolute;top:0;left:60px;right:60px;height:1px;background:linear-gradient(90deg,transparent,rgba(91,141,239,.5),rgba(168,85,247,.35),transparent)}
.logo{display:flex;align-items:center;gap:9px;margin-bottom:26px}
.logo-mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#5b8def,#a855f7);display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(91,141,239,.3)}
.logo-mark img{width:16px;height:16px;color:#fff}
.logo-name{font-size:14px;font-weight:800;background:linear-gradient(135deg,#5b8def,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-wordmark{width:148px;height:auto;display:block}
h1{font-size:22px;font-weight:800;letter-spacing:-.4px;margin-bottom:6px}
.sub{font-size:13px;color:rgba(255,255,255,.3);margin-bottom:24px;line-height:1.6}
.field{display:grid;gap:7px;margin-bottom:14px}
.field label{font-size:11px;font-weight:600;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.1em}
.field input{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:11px;color:#e8e8ff;font-size:14px;padding:13px 16px;outline:none;width:100%;transition:border .2s;font-family:inherit}
.field input:focus{border-color:rgba(91,141,239,.45);box-shadow:0 0 0 3px rgba(91,141,239,.1)}
.err{background:rgba(255,69,96,.06);border:1px solid rgba(255,69,96,.18);border-radius:9px;color:#e05070;font-size:12px;padding:10px 14px;margin-bottom:14px;display:none;line-height:1.5}
.err.show{display:block}
.success{background:rgba(31,209,122,.06);border:1px solid rgba(31,209,122,.18);border-radius:9px;color:#1fd17a;font-size:13px;padding:14px;margin-bottom:14px;display:none;line-height:1.6;font-weight:500}
.success.show{display:block}
.submit{width:100%;padding:14px;background:linear-gradient(135deg,#5b8def,#a855f7);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s;font-family:inherit;box-shadow:0 4px 22px rgba(91,141,239,.35)}
.submit:hover:not(:disabled){opacity:.88}
.submit:disabled{opacity:.4;cursor:not-allowed}
.back{display:block;text-align:center;margin-top:16px;color:rgba(255,255,255,.25);font-size:12px;text-decoration:none;transition:color .15s}
.back:hover{color:rgba(255,255,255,.5)}
.expired-state{text-align:center}
.expired-icon{font-size:44px;margin-bottom:14px}
.expired-title{font-size:18px;font-weight:700;margin-bottom:8px}
.expired-sub{color:rgba(255,255,255,.3);font-size:13px;margin-bottom:22px;line-height:1.6}
.back-btn{display:inline-block;padding:12px 28px;background:linear-gradient(135deg,#5b8def,#a855f7);color:#fff;border-radius:10px;font-weight:700;font-size:14px;text-decoration:none}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="logo">
    <img class="logo-wordmark" src="/clonyfy-logo.png" alt="CLONYFY">
  </div>

  <div id="form-view">
    <h1>Set new password</h1>
    <div class="sub">Enter a new password for your account.</div>
    <div id="err" class="err"></div>
    <div id="success" class="success"></div>
    <div class="field">
      <label>New password</label>
      <input type="password" id="pw" placeholder="Min. 8 characters" minlength="8" autocomplete="new-password" required>
    </div>
    <div class="field">
      <label>Confirm password</label>
      <input type="password" id="pw2" placeholder="Repeat password" autocomplete="new-password" required>
    </div>
    <button class="submit" id="submit-btn" onclick="submit()">Reset Password</button>
    <a href="/" class="back">← Back to sign in</a>
  </div>

  <div id="expired-view" class="expired-state hidden">
    <div class="expired-icon">⏰</div>
    <div class="expired-title">Link expired</div>
    <div class="expired-sub">This reset link has expired or already been used. Request a new one from the sign in page.</div>
    <a class="back-btn" href="/">Back to App</a>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const token = params.get('token') || '';
if (!token) document.getElementById('expired-view').classList.remove('hidden'), document.getElementById('form-view').classList.add('hidden');

async function submit() {
  const pw = document.getElementById('pw').value;
  const pw2 = document.getElementById('pw2').value;
  const errEl = document.getElementById('err');
  errEl.className = 'err';
  document.getElementById('success').className = 'success';
  if (pw !== pw2) { errEl.textContent = 'Passwords do not match'; errEl.className = 'err show'; return; }
  if (pw.length < 8) { errEl.textContent = 'Password must be at least 8 characters'; errEl.className = 'err show'; return; }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Resetting…';
  try {
    const r = await fetch('/api/auth/reset-password', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pw }),
    });
    const data = await r.json();
    if (data.error) {
      if (data.error.includes('invalid') || data.error.includes('expired')) {
        document.getElementById('form-view').classList.add('hidden');
        document.getElementById('expired-view').classList.remove('hidden');
      } else {
        errEl.textContent = data.error; errEl.className = 'err show';
      }
      return;
    }
    const ok = document.getElementById('success');
    ok.textContent = '✓ Password reset successfully! Redirecting to sign in…';
    ok.className = 'success show';
    document.getElementById('pw').value = '';
    document.getElementById('pw2').value = '';
    setTimeout(() => location.href = '/', 2000);
  } catch { errEl.textContent = 'Network error. Try again.'; errEl.className = 'err show'; }
  finally { btn.disabled = false; btn.textContent = 'Reset Password'; }
}
document.getElementById('pw2').addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
</script>
</body>
</html>
